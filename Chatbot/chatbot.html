<!DOCTYPE html>
<html lang="pt">

<head>

<meta charset="UTF-8">

<title>Chat flutuante</title>

<link rel="stylesheet" href="chatbot.css">

</head>

<body>


<!-- botão do chat -->

<button class="open-chat" onclick="toggleChat()">

<img 
id="chatIcon"
src="icone-dormindo.png"
class="chat-icon"
>

</button>



<!-- caixa do chat -->

<div id="chat" class="chat-box">

<div class="top">

<img src="icone.png" class="avatar">

<div class="name">
ChatBot
</div>

<button class="close" onclick="toggleChat()">
✖
</button>

</div>



<div id="messages" class="messages">

<div class="bot">
Oi, como posso ajudar?
</div>

</div>



<div class="bottom">

<input 
id="text" 
placeholder="Digite..."
>

<button onclick="sendMessage()">
Enviar
</button>

</div>


</div>


<script src="chatbot.js"></script>

</body>

</html>
