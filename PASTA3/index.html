<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <span id="loginBtn">Login</span>

  <div class="dropdown" id="loginMenu">

    
    <span id="voltarBtn">←</span>

    
    <div id="telaLogin">
      <label>e-mail</label>
      <input type="email" id="loginEmail">

      <label>senha</label>
      <input type="password" id="loginSenha">

      <p id="esqueceu">esqueceu a senha</p>
      <p id="cadastrar">cadastrar-se</p>

      <button id="entrarBtn" class="btn">entrar</button>
    </div>

    
    <div id="telaSenha" style="display:none;">
      <label>nova senha</label>
      <input type="password" id="novaSenha">

      <button id="alterarBtn" class="btn">alterar</button>
    </div>

    
    <div id="telaCadastro" style="display:none;">
      <label>e-mail</label>
      <input type="email" id="cadEmail">

      <label>senha</label>
      <input type="password" id="senhaCadastro">

      <button id="cadastrarBtn" class="btn">cadastrar</button>
    </div>

  </div>
</header>

<script src="script.js"></script>
</body>
</html>
