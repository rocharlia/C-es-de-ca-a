<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <span id="loginBtn">Login</span>

  <div class="dropdown" id="loginMenu">

    <span id="voltarBtn">←</span>

    <div id="telaLogin">
      <label>e-mail</label>
      <input type="email" id="loginEmail">

      <label>senha</label>
      <input type="password" id="loginSenha">

      <p id="esqueceu">esqueceu a senha</p>
      <p id="cadastrar">cadastrar-se</p>

      <button id="entrarBtn" class="btn">entrar</button>
    </div>

    <div id="telaSenha" style="display:none;">
      <label>nova senha</label>
      <input type="password" id="novaSenha">

      <p id="AlterarSenha">
        A senha deve ter:
        <br><span id="a1">• Pelo menos 6 caracteres</span>
        <br><span id="a2">• Letra maiúscula</span>
        <br><span id="a3">• Letra minúscula</span>
        <br><span id="a4">• Número</span>
      </p>

      <button id="alterarBtn" class="btn">alterar</button>
    </div>


    <div id="telaCadastro" style="display:none;">
      <label>e-mail</label>
      <input type="email" id="cadEmail">

      <p id="erroEmail" >
        Email já cadastrado
      </p>

      <label>senha</label>
      <input type="password" id="senhaCadastro">

      <p id="regrasSenhaCadastro">
        A senha deve ter:
        <br><span id="r1">• Pelo menos 6 caracteres</span>
        <br><span id="r2">• Letra maiúscula</span>
        <br><span id="r3">• Letra minúscula</span>
        <br><span id="r4">• Número</span>
      </p>

      <button id="cadastrarBtn" class="btn">cadastrar</button>
    </div>

  </div>
</header>

<script src="script.js"></script>
</body>
</html>
