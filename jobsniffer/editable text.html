<html>

<body>

    <!-- ADD TEXT EDIT INTERFACE ON HOVER -->

    <span class="editavel">Click to edit</span>

    <script type="text/javascript">

    // quando um clique acontece, executa
    document.addEventListener('click', function (e) {
        // checa se o que foi clicado tem a classe "editavel"
        if (e.target.classList.contains('editavel')) {
            // transforma de "editável" para "editando" (executa a função editando)
            editando(e.target);
        }
    });

    // função editando
    function editando(span) {
        // guarda o texto dentro do span "editavel" numa variável
        const originalText = span.textContent;

        // cria um novo elemento da tag <input>
        const input = document.createElement("input");
            // define que dentro do <input> só pode texto
            input.type = "text";
            // coloca o texto que originalmente tava dentro da span no <input>
            input.value = originalText;
            // cria uma classe para customizar visualmente enquanto editando
            input.className = "editandoInput";
            // troca o elemento <span> na tela por um elemento <input> (um digitável)
            span.replaceWith(input);
            // Automatically focus the input so the user can start typing
            input.focus();


        // -------- SAVE FUNCTION --------
        // Replaces input with updated span
        function save() {

            // Create a new span with the updated text
            const newSpan = createSpan(input.value);

            // Replace input with the new span
            input.replaceWith(newSpan);
        }


        // -------- CANCEL FUNCTION --------
        // Restores the original text (ignores user changes)
        function cancel() {

            // Create a new span using the ORIGINAL text
            const newSpan = createSpan(originalText);

            // Replace input with the restored span
            input.replaceWith(newSpan);
        }


        // -------- BLUR EVENT (AUTO-SAVE) --------
        // When the input loses focus, save changes automatically
        function handleBlur() {
            save();
        }

        input.addEventListener("blur", handleBlur);


        // -------- KEYBOARD EVENTS --------
        input.addEventListener("keydown", function (e) {

            // If user presses ENTER → save changes
            if (e.key === "Enter") {

                // Remove blur listener to prevent double execution
                input.removeEventListener("blur", handleBlur);

                save();
            }

            // If user presses ESCAPE → cancel editing
            if (e.key === "Escape") {

                // Remove blur listener so cancel isn't overridden by save
                input.removeEventListener("blur", handleBlur);

                cancel();
            }
        });
    }


    // Helper function to create a reusable editavel span
    function createSpan(text) {

        // Create a new span element
        const span = document.createElement("span");

        // Assign the same class so it remains editavel in the future
        span.className = "editavel";

        // Set its visible text
        span.textContent = text;

        // Return the constructed span
        return span;
    }



    // Example JS logic for your save() function
function save(idVaga, novosDados) {
    fetch(`/api/vagas/${idVaga}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(novosDados)
    })
    .then(res => res.json())
    .then(data => alert("Salvo no Banco SQL!"));
}
    </script>
</body>

</html>
